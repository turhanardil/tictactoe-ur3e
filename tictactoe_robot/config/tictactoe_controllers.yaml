# Controllers config for the tictactoe-ur3e capstone.
#
# Adapted from Universal_Robots_ROS2_GZ_Simulation/ur_simulation_gz/config/
# ur_controllers.yaml on the ros2 branch. Identical except for the
# trajectory tolerance constraints below, which were widened from 0.2 rad
# to 1.0 rad. The upstream value triggered PATH_TOLERANCE_VIOLATED aborts
# under Gazebo Sim Harmonic with the GUI rendering enabled, where the JTC
# can fall a few milli-radians behind the planned trajectory at high
# physics solver load. The widened value still catches the kind of gross
# tracking failure (controller offline, hardware stuck) that this
# constraint is supposed to detect, while not aborting on solver jitter.
# Goal tolerance stays tight so the final pose is still accurate.
#
# This is the only controller-config tuning we make. The rest, including
# the gz_ros2_control position_proportional_gain and any Ruckig settings,
# stays at the upstream default.

controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    io_and_status_controller:
      type: ur_controllers/GPIOController

    speed_scaling_state_broadcaster:
      type: ur_controllers/SpeedScalingStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    forward_position_controller:
      type: position_controllers/JointGroupPositionController


speed_scaling_state_broadcaster:
  ros__parameters:
    state_publish_rate: 100.0

joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      shoulder_pan_joint:  { trajectory: 1.0, goal: 0.1 }
      shoulder_lift_joint: { trajectory: 1.0, goal: 0.1 }
      elbow_joint:         { trajectory: 1.0, goal: 0.1 }
      wrist_1_joint:       { trajectory: 1.0, goal: 0.1 }
      wrist_2_joint:       { trajectory: 1.0, goal: 0.1 }
      wrist_3_joint:       { trajectory: 1.0, goal: 0.1 }


scaled_joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    speed_scaling_interface_name: ""
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      shoulder_pan_joint:  { trajectory: 1.0, goal: 0.1 }
      shoulder_lift_joint: { trajectory: 1.0, goal: 0.1 }
      elbow_joint:         { trajectory: 1.0, goal: 0.1 }
      wrist_1_joint:       { trajectory: 1.0, goal: 0.1 }
      wrist_2_joint:       { trajectory: 1.0, goal: 0.1 }
      wrist_3_joint:       { trajectory: 1.0, goal: 0.1 }

forward_velocity_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    interface_name: velocity

forward_position_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
